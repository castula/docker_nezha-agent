name: Debian Auto Build and Push

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0


      - name: Determine Build Condition and Download Artifacts
        id: build_condition
        run: |
          set -e

          REMOTE_VERSION=$(curl -s \
          https://api.github.com/repos/nezhahq/agent/releases/latest \
          | jq -r .tag_name)

          echo "最新远程版本: ${REMOTE_VERSION}"

          VERSION_FILE=".github/last_version.txt"
          LOCAL_VERSION=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
            echo "触发类型: ${{ github.event_name }}"
          else
            echo "跳过"
            echo "SHOULD_BUILD=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi


          if [ -f "$VERSION_FILE" ]; then
            LOCAL_VERSION=$(cat "$VERSION_FILE")
            echo "当前版本: $LOCAL_VERSION"
          else
            LOCAL_VERSION="none"
            echo "首次构建"
          fi


          if [ "$REMOTE_VERSION" != "$LOCAL_VERSION" ]; then

            echo "发现新版本: $REMOTE_VERSION"

            echo "SHOULD_BUILD=true" >> "$GITHUB_OUTPUT"
            echo "AGENT_VERSION=${REMOTE_VERSION}" >> "$GITHUB_OUTPUT"


            mkdir -p build-context


            for arch in amd64 arm64
            do
              echo "下载 ${arch}"

              curl -fL \
              -o build-context/nezha-agent_linux_${arch}.zip \
              https://github.com/nezhahq/agent/releases/download/${REMOTE_VERSION}/nezha-agent_linux_${arch}.zip

            done

          else

            echo "无更新"
            echo "SHOULD_BUILD=false" >> "$GITHUB_OUTPUT"

          fi


      - name: Debug build condition
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Build: ${{ steps.build_condition.outputs.SHOULD_BUILD }}"
          echo "Version: ${{ steps.build_condition.outputs.AGENT_VERSION }}"


      - name: Set up QEMU
        if: steps.build_condition.outputs.SHOULD_BUILD == 'true'
        uses: docker/setup-qemu-action@v3


      - name: Set up Docker Buildx
        if: steps.build_condition.outputs.SHOULD_BUILD == 'true'
        uses: docker/setup-buildx-action@v3


      - name: Login GHCR
        if: steps.build_condition.outputs.SHOULD_BUILD == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Login DockerHub
        if: steps.build_condition.outputs.SHOULD_BUILD == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build and push Debian stable-slim image
        if: steps.build_condition.outputs.SHOULD_BUILD == 'true'
        uses: docker/build-push-action@v5
        with:

          context: .

          push: true

          platforms: |
            linux/amd64
            linux/arm64


          tags: |

            ghcr.io/${{ github.repository_owner }}/nezha-agent:${{ steps.build_condition.outputs.AGENT_VERSION }}

            ghcr.io/${{ github.repository_owner }}/nezha-agent:latest


            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nezha-agent:${{ steps.build_condition.outputs.AGENT_VERSION }}

            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nezha-agent:latest


          build-args: |
            AGENT_VERSION=${{ steps.build_condition.outputs.AGENT_VERSION }}


          cache-from: type=gha
          cache-to: type=gha,mode=max



      - name: Save last version
        if: steps.build_condition.outputs.SHOULD_BUILD == 'true'
        run: |

          echo "${{ steps.build_condition.outputs.AGENT_VERSION }}" \
          > .github/last_version.txt


          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"


          git add .github/last_version.txt


          if git diff --staged --quiet; then

            echo "无变化"

          else

            git commit \
            -m "chore: update last_version.txt"


            git push

          fi



      - name: Delete untagged GHCR images
        if: steps.build_condition.outputs.SHOULD_BUILD == 'true'
        uses: Chizkiyahu/delete-untagged-ghcr-action@v6
        with:

          token: ${{ secrets.GITHUB_TOKEN }}

          repository_owner: ${{ github.repository_owner }}

          repository: ${{ github.event.repository.name }}

          package_name: nezha-agent

          untagged_only: true

          owner_type: ${{ github.event.repository.owner.type == 'Organization' && 'org' || 'user' }}



      - name: Summary
        if: always()
        run: |

          if [ "${{ steps.build_condition.outputs.SHOULD_BUILD }}" = "true" ]; then

            echo "✅ Debian stable-slim 构建完成"

            echo "版本:"
            echo "${{ steps.build_condition.outputs.AGENT_VERSION }}"

          else

            echo "⏭️ 无版本更新"

          fi



  cleanup:

    runs-on: ubuntu-latest

    needs: build-and-push


    steps:

      - name: Cleanup workflow runs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

        run: |

          gh api repos/${{ github.repository }}/actions/runs \
          --paginate \
          --jq '.workflow_runs | sort_by(.created_at) | reverse | .[3:] | .[].id' |
          
          while read run_id;

          do

            echo "删除 $run_id"

            gh api \
            repos/${{ github.repository }}/actions/runs/$run_id \
            -X DELETE

          done
